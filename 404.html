<!doctype html>
<html lang="en">
  <!-- SwitchOn 404 page -->
  <head>
    <meta charset="UTF-8" />

    <title>404 | SwitchOn</title>
    <meta name="description" content="The requested page could not be found." />
    <link rel="icon" href="favicon.png" type="image/png" />
